apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-daemonset
  labels:
    app: myapp
spec:
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      name: my-temp
      laels:
        app: myapp
    spec:
      conntainers:
        - name: daemon-cont
          image: amazon/cloudwatch-agent
          ports:
            - containerPort: 80