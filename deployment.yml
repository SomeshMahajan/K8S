api-Version: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: myapp
spec:
  replicas: 5
  selector:
    matchLabels:
      app: myapp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      name: my-temp
      labels:
        app: myapp
    spec:
      containers:
        - name: nginx-cont
          image: mayurpandit25/studentapp-frontend:latest
          ports:
            - name: dep-port
              containerPort: 80
...
---
apiVersion: v1
kind: Service
metadata:
  name: dep-svc
  labels:
    app: myapp
spec:
  type: NodePort
  selector:
    app: myapp
    ports:
    - name: svc-port
      port: 80
      targetPort: 80