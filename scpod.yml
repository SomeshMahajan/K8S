apiVersion: v1
kind: Pod
metadata:
  name: secret-Pod
spec:
  containers:
  - name: nginx
    image: nginx:latest
    env:
    - name: DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: db-secret
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-secret
          key: password